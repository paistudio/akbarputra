    <style>
        /* Import Font Delight */
        @font-face {

            font-weight: 300;
            font-style: normal;
            font-display: swap;
        }

        @font-face {
            font-family: 'Delight';
            src: url('./font-delight/Web-PS/Delight-Regular.woff2') format('woff2'),

            font-weight: 400;
            font-style: normal;
            font-display: swap;
        }

        @font-face {
            font-family: 'Delight';
            src: url('./font-delight/Web-PS/Delight-Medium.woff2') format('woff2'),

            font-style: normal;
            font-display: swap;
        }

        @font-face {
            font-family: 'Delight';
            src: url('./font-delight/Web-PS/Delight-SemiBold.woff2') format('woff2'),

            font-weight: 600;
            font-style: normal;
            font-display: swap;
        }

        @font-face {
            font-family: 'Delight';
            src: url('./font-delight/Web-PS/Delight-Bold.woff2') format('woff2'),

            font-style: normal;

        :root {
            /* Colors */
            --color-midnight-ink: #000000;
            --color-canvas-white: #ffffff;
            --color-desert-dune: #d7cecc;
            --color-cloud-gray: #f6f5f5;
            --color-slate-gray: #afaeae;

            /* Typography */
            --font-primary: 'Plus Jakarta Sans', ui-sans-serif, system-ui, -apple-system, sans-serif;
            --font-mono: 'IBM Plex Mono', ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
            --font-display: 'Delight', var(--font-primary);

            /* Spacing & Layout */
            --spacing-8: 8px;
            --spacing-16: 16px;
            --spacing-24: 24px;
            --spacing-48: 48px;
            --section-gap: 48px;

            /* Radii */
            --radius-cards: 16px;
            --radius-buttons: 999px;
        }

        * {
            box-sizing: border-box;
        }

        body {
            background-color: var(--color-canvas-white);
            color: var(--color-midnight-ink);
            font-family: var(--font-primary);
            margin: 0;
            padding: var(--spacing-48) var(--spacing-16);
            display: flex;
            justify-content: center;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            position: relative;
            /* Ditambahkan untuk canvas background */
        }

        /* --- Background Canvas --- */
        #bg-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            pointer-events: none;
            opacity: 0.4; /* Sedikit dinaikkan transparansinya agar matrix grid lebih tegas */
        }

        .container {
            width: 100%;
            max-width: 540px;
            display: flex;
            flex-direction: column;
            gap: var(--section-gap);
            position: relative;
            /* Memastikan konten berada di atas canvas */
            z-index: 1;
        }

        /* --- Profile Section --- */
        .profile-section {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            text-align: left;
            position: relative;
        }

        .profile-info-wrapper {
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            /* Ubah ke flex-start untuk profil Threads */
        }

        .profile-text-content {
            flex: 1;
            padding-right: var(--spacing-16);
        }

        .profile-img {
            width: 84px;
            /* Ukuran avatar khas Threads (agak lebih kecil dari Twitter) */
            height: 84px;
            border-radius: 50%;
            object-fit: cover;
            background-color: var(--color-canvas-white);
            /* Hilangkan border tebal */
            border: 1px solid rgba(0, 0, 0, 0.05);
        }

        .text-heading-sm {
            font-size: 52px;
            font-family: var(--font-display); /* Menggunakan font kustom Delight */
            line-height: 1.2;
            font-weight: 700;
            margin: 0 0 4px 0;
            letter-spacing: -0.02em;
        }

        /* Username bergaya Threads (badge abu-abu kecil di samping atau bawah nama) */
        .text-handle {
            font-size: 18px;
            color: var(--color-slate-gray);
            margin: 0 0 var(--spacing-16) 0;
            display: inline-block;
            /* background-color: var(--color-cloud-gray); */
            /* padding: 4px 8px; */
            /* border-radius: var(--radius-buttons); */
        }

        .text-body {
            font-family: var(--font-display);
            font-size: 24px;
            line-height: 1.5;
            font-weight: 500;
            color: var(--color-midnight-ink);
            margin: 0 0 var(--spacing-16) 0;
        }

        /* --- Social Icons --- */
        .social-icons {
            display: flex;
            gap: var(--spacing-8);
            margin-top: 0;
        }

        .social-icon-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 32px;
            height: 32px;
            border-radius: var(--radius-buttons);
            background-color: transparent;
            color: var(--color-midnight-ink);
            text-decoration: none;
            font-size: 20px;
            transition: background-color 0.2s ease;
        }

        .social-icon-btn:hover {
            background-color: var(--color-cloud-gray);
        }

        /* --- Links Section --- */
        .links-section {
            display: flex;
            flex-direction: column;
            gap: var(--spacing-16);
        }

        .link-card {
            display: flex;
            align-items: center;
            padding: var(--spacing-16) var(--spacing-24);
            background-color: #f6f5f5;
            border: 0px solid var(--color-midnight-ink);
            border-radius: var(--radius-cards);
            text-decoration: none;
            color: var(--color-midnight-ink);
            font-family: var(--font-display);
            font-weight: 500;
            /* Dibuat sedikit lebih tebal untuk font Plus Jakarta Sans */
            font-size: 18px;
            transition: all 0.2s ease;
        }

        .link-card:hover {
            background-color: var(--color-midnight-ink);
            color: var(--color-canvas-white);
        }

        .link-card i {
            font-size: 24px;
            margin-right: var(--spacing-16);
        }

        .link-card .arrow-icon {
            margin-left: auto;
            margin-right: 0;
            opacity: 0.5;
        }

        /* --- Contact Section --- */
        .contact-section {
            display: flex;
            gap: var(--spacing-16);
        }

        .btn-primary,
        .btn-secondary {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: var(--spacing-8);
            padding: 14px var(--spacing-24);
            border-radius: var(--radius-buttons);
            text-decoration: none;
            font-size: 16px;
            transition: all 0.2s ease;
            font-family: var(--font-display);
            font-weight: 500;
            letter-spacing: 0.05em;
        }

        .btn-primary {
            /* background-color: var(--color-midnight-ink); */
            color: var(--color-midnight-ink)
        }

        .btn-primary:hover {
            opacity: 0.9;
        }

        .btn-secondary {
            /* background-color: var(--color-canvas-white); */
            color: var(--color-midnight-ink);
        }

        .btn-secondary:hover {
            background-color: var(--color-cloud-gray);
        }


        /* --- Cal.com Section --- */
        .cal-section {
            background-color: var(--color-cloud-gray);
            border-radius: var(--radius-cards);
            padding: var(--spacing-8);
            overflow: hidden;
        }

        .cal-header {
            font-size: 18px;

            letter-spacing: -0.02em;
            margin-bottom: var(--spacing-16);
            padding: var(--spacing-16) var(--spacing-16) 0;
            text-align: center;
        }
    </style>

<body>

    <!-- Animasi Pixel Background -->
    <canvas id="bg-canvas"></canvas>

    <main class="container">

    <!-- Pixelated Animation Script -->
    <script>
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');

        let width, height;
        const spacing = 16; // Jarak antar dot halftone

        // Dinosaurus Pixel Art (T-Rex)
        // Frame 1: Kaki kanan di atas
        const dinoFrame1 = [
            "               11111111",
            "              111111111",
            "              111111111",
            "              111011111",
            "              111111111",
            "              1111111  ",
            "              11111    ",
            "1      11     1111111  ",
            "11    111111111111     ",
            "111  1111111111111111  ",
            " 1111111111111111      ",
            "  11111111111111       ",
            "    11111111111        ",
            "      1111111          ",
            "       11  11          ",
            "       11   1          ",
            "       11   11         ",
            "      111              "
        ];

        // Frame 2: Kaki kiri di atas
        const dinoFrame2 = [
            "               11111111",
            "              111111111",
            "              111111111",
            "              111011111",
            "              111111111",
            "              1111111  ",
            "              11111    ",
            "1      11     1111111  ",
            "11    111111111111     ",
            "111  1111111111111111  ",
            " 1111111111111111      ",
            "  11111111111111       ",
            "    11111111111        ",
            "      1111111          ",
            "       11  11          ",
            "        1  11          ",
            "        11  11         ",
            "             111       "
        ];

        const frames = [dinoFrame1, dinoFrame2];
        let currentFrameIdx = 0;
        
        // Posisi dan pergerakan dinosaurus
        let dinoX = 0;
        let dinoY = 0; 
        
        // Target posisi dari mouse
        let targetX = 0;
        let targetY = 0;
        
        // Status orientasi
        let isFacingRight = true;

        let frameCounter = 0;
        const animationSpeed = 8; // Ganti frame setiap N iterasi
        
        // Konstanta untuk pergerakan dinamis (easing)
        const easing = 0.05; // Seberapa cepat dino mengejar kursor

        // Mouse event listener
        window.addEventListener('mousemove', (e) => {
            // Konversi posisi pixel mouse ke kordinat grid
            targetX = e.clientX / spacing;
            targetY = (e.clientY / spacing) - (dinoFrame1.length / 2); // Pusatkan dino di kursor
        });

        // Event touch untuk mobile
        window.addEventListener('touchmove', (e) => {
            if(e.touches.length > 0) {
                targetX = e.touches[0].clientX / spacing;
                targetY = (e.touches[0].clientY / spacing) - (dinoFrame1.length / 2);
            }
        });

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            
            // Set Y position default jika mouse belum bergerak
            const rows = Math.ceil(height / spacing);
            if(targetX === 0 && targetY === 0) {
                targetX = width / spacing / 2;
                targetY = rows * 0.7;
                dinoX = targetX;
                dinoY = targetY;
            }
        }

        // Fungsi menggambar pola Halftone dasar
        function drawHalftoneBackground() {
            const cols = Math.ceil(width / spacing);
            const rows = Math.ceil(height / spacing);

            for (let y = 0; y < rows; y++) {
                for (let x = 0; x < cols; x++) {
                    // Gradien ukuran dot dari atas ke bawah untuk efek halftone
                    const yRatio = y / rows;
                    // Ukuran dot membesar ke bawah, tapi dibuat jauh lebih kecil
                    const radius = 0.2 + (yRatio * 1.2); 
                    
                    ctx.beginPath();
                    ctx.arc(x * spacing, y * spacing, radius, 0, Math.PI * 2);
                    ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
                    ctx.fill();
                }
            }
        }

        // Fungsi menggambar Dinosaurus dengan dot besar (Halftone subject)
        function drawDino() {
            const frame = frames[currentFrameIdx];
            const maxRadius = spacing * 0.15; // Dot dikecilkan lagi agar lebih halus

            for (let y = 0; y < frame.length; y++) {
                const row = frame[y];
                for (let x = 0; x < row.length; x++) {
                    // Jika menghadap ke kiri, balik pembacaan x (flip horizontal)
                    const pixelX = isFacingRight ? x : (row.length - 1 - x);
                    
                    if (row[pixelX] === '1') {
                        // Posisi aktual di layar (grid)
                        const gridX = Math.floor(dinoX) + x - (row.length / 2); // Pusatkan titik tumpu X
                        const gridY = Math.floor(dinoY) + y;
                        
                        // Gambar hanya jika berada di dalam layar
                        if (gridX >= -row.length && gridX * spacing < width + (row.length*spacing)) {
                            ctx.beginPath();
                            ctx.arc(gridX * spacing, gridY * spacing, maxRadius, 0, Math.PI * 2);
                            // Warna dinosaurus (mengikuti aksen desain)
                            ctx.fillStyle = 'rgba(0, 0, 0, 0.2)'; 
                            ctx.fill();
                        }
                    }
                }
            }
        }

        function animate() {
            ctx.clearRect(0, 0, width, height);

            // 1. Gambar background halftone statis
            drawHalftoneBackground();

            // Hitung jarak ke target (mouse)
            const dx = targetX - dinoX;
            const dy = targetY - dinoY;
            const distance = Math.sqrt(dx * dx + dy * dy);

            // Gerakkan Dinosaurus menggunakan Easing (interpolasi agar halus)
            if (distance > 0.5) { // Hanya bergerak jika jarak cukup jauh
                dinoX += dx * easing;
                dinoY += dy * easing;

                // Tentukan arah hadap dinosaurus berdasarkan arah X
                if (dx > 0) {
                    isFacingRight = true;
                } else if (dx < 0) {
                    isFacingRight = false;
                }

                // Animasi kaki hanya berjalan saat dinosaurus bergerak
                frameCounter++;
                if (frameCounter >= animationSpeed) {
                    currentFrameIdx = (currentFrameIdx + 1) % frames.length;
                    frameCounter = 0;
                }
            } else {
                // Saat berhenti, kembalikan ke posisi berdiri (frame 1)
                currentFrameIdx = 0;
            }

            // 2. Gambar Dinosaurus yang berjalan
            drawDino();

            requestAnimationFrame(animate);
        }

        window.addEventListener('resize', resize);

        resize();
        animate();
    </script>

</body>
